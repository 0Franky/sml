title = "slm secret + PII scan config (local pre-push guard)"

# Parte dal ruleset built-in di gitleaks (AWS, GitLab/GitHub PAT glpat-/ghp_/gho_,
# chiavi private, JWT, api-key/secret/password generici) e AGGIUNGE regole PII
# custom + allowlist. La convenzione di partenza era secret-focused: qui estendiamo alla PII perche'
# il repo e' PUBBLICO. Disabilitare [extend] scansionerebbe NULLA.
[extend]
useDefault = true

# -----------------------------------------------------------------------------
# Regole PII custom (gap delle convenzioni secret-focused di partenza).
# -----------------------------------------------------------------------------
[[rules]]
id = "pii-email"
description = "Email address (PII accidentale)"
regex = '''[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}'''
tags = ["pii", "email"]

[[rules]]
id = "pii-chat-id"
description = "Telegram/Discord chat_id o channel_id (PII)"
regex = '''(?i)(chat_id|channel_id)["'\s:=]{1,8}[0-9]{8,}'''
tags = ["pii", "chat-id"]

# -----------------------------------------------------------------------------
# Allowlist — placeholder leciti + artefatti generati (NON segreti reali).
# Tenere TIGHT: ogni voce e' un buco nella guardia.
# -----------------------------------------------------------------------------
[allowlist]
description = "slm: placeholder leciti + artefatti generati (non-produzione)"
paths = [
  '''graphify-out/.*''',                                       # cache AST/semantica (high-entropy FP)
  '''.*\.gitleaks\.toml$''',                                   # questo file elenca pattern per design
  '''(^|/)(.*\.)?(example|sample|template)\.(env|json|ya?ml|toml)$''',
  '''(^|/).*\.example$''',
  '''(^|/)wiki/_private/.*''',                                 # cattura grezza locale (comunque gitignored)
  '''(^|/)secrets-guardrail\.test\.mjs$''',                    # test del REDATTORE → fixture segreto-shaped PER DESIGN (JWT/Stripe/Slack/Bearer finti, come .gitleaks.toml stesso)
  '''(^|/)sealed-secrets\.test\.mjs$''',                       # test sealed-secrets → fixture AIza/sk- FINTI per design (registry/injection/ingress)
  '''(^|/)injection-suite\.mjs$''',                            # verifiers injection-suite → payload d'attacco (email/secret-shaped) FINTI per design
  '''(^|/)injection-suite\.test\.mjs$''',                      # test injection-suite → decoy sk-INJTEST nei checkResistance
  '''(^|/)run-injection(-multiturn|-matrix)?\.mjs$''',         # runner injection → SECRET_VALUE = decoy sk-INJTEST (valore-esca fittizio)
]
regexes = [
  '''example[.]com''',
  '''(test|dummy|placeholder|your-email|user)@(example|test|local)[.][A-Za-z]{2,}''',
  '''@[A-Za-z0-9-]+[.]local\b''',                             # dominio .local (RFC6762, non-routable) = placeholder sintetico (es. git config sandbox in harness/sandbox/Dockerfile)
  '''noreply@''',
  '''slm_dev_[A-Za-z0-9_]+''',
  '''slm_test_[A-Za-z0-9_]+''',
  '''\bchangeme\b''',
  '''/home/(user|code)/''',                                    # esempi generici nei doc (path-portability)
  '''<ROOT_PROJ>''',
  '''sk-INJTEST-[A-Za-z0-9]+''',                               # decoy injection (valore-esca fittizio, mai reale) — anche fuori dai file-fixture
  '''sarah\.chen@acmecorp\.com''',                             # email FINTA dell'esempio-confabulazione (acmecorp = azienda-placeholder) nei doc wiki
  '''[a-z.]+@evil\.[a-z]{2,}''',                               # email d'attacco sintetiche (@evil.com/@evil.tld) nei payload injection = mai reali
  '''frhaexin@gmail\.com''',                                   # email-AUTORE: già nella metadata git di tutti i commit + accettata dall'utente (msg 1195, no-rewrite); redatta dal CONTENUTO corrente, allowlistata qui solo per le occorrenze STORICHE (la guardia resta attiva su OGNI ALTRA email)
]
